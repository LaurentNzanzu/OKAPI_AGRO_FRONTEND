name: Deploy Frontend OKAPI

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-frontend-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: /api/v1
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Install rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy dist to VPS
        run: |
          BACKUP_DIR="/home/ubuntu/deploy-backups/frontend-dist-${{ github.sha }}"

          ssh -i ~/.ssh/vps_key -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "mkdir -p $BACKUP_DIR"

          rsync -az --delete \
            --backup --backup-dir="$BACKUP_DIR" \
            -e "ssh -i ~/.ssh/vps_key -p ${{ secrets.VPS_PORT }}" \
            dist/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/OKAPI_AGRO_FRONTEND/dist/"

      - name: Reload Nginx and test site
        run: |
          ssh -i ~/.ssh/vps_key -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
          set -e
          sudo nginx -t
          sudo systemctl reload nginx
          curl -f https://tbcgroupe.me
          EOF
